<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- MedManage Variant - Emphasizes teal (health/medical) with cross-node motif -->
  
  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="#F8FAFB"/>
  
  <!-- Node 1 - left (navy) -->
  <circle cx="185" cy="290" r="100" fill="none" stroke="#1B2A4A" stroke-width="10"/>
  <circle cx="185" cy="290" r="52" fill="#1B2A4A" opacity="0.07"/>
  
  <!-- Node 2 - top right (teal, larger - dominant for medical) -->
  <circle cx="310" cy="195" r="110" fill="none" stroke="#0EA5A0" stroke-width="12"/>
  <circle cx="310" cy="195" r="58" fill="#0EA5A0" opacity="0.08"/>
  
  <!-- Node 3 - bottom right (amber) -->
  <circle cx="310" cy="345" r="100" fill="none" stroke="#E8893C" stroke-width="10"/>
  <circle cx="310" cy="345" r="52" fill="#E8893C" opacity="0.07"/>
  
  <!-- Intersection highlights -->
  <circle cx="248" cy="238" r="16" fill="#0EA5A0" opacity="0.9"/>
  <circle cx="248" cy="320" r="16" fill="#E8893C" opacity="0.85"/>
  <circle cx="312" cy="270" r="16" fill="#0EA5A0" opacity="0.9"/>
  
  <!-- Connection lines -->
  <line x1="185" y1="290" x2="310" y2="195" stroke="#0EA5A0" stroke-width="3.5" opacity="0.3"/>
  <line x1="185" y1="290" x2="310" y2="345" stroke="#E8893C" stroke-width="3.5" opacity="0.3"/>
  <line x1="310" y1="195" x2="310" y2="345" stroke="#0EA5A0" stroke-width="3.5" opacity="0.3"/>
  
  <!-- "M" badge in bottom-right corner -->
  <circle cx="420" cy="420" r="48" fill="#0EA5A0"/>
  <text x="420" y="438" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="48" font-weight="700" fill="white" text-anchor="middle">M</text>
</svg>
