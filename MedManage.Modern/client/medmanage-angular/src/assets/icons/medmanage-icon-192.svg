<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- MedManage Variant - Emphasizes teal (health/medical) -->
  
  <!-- Subtle rounded square background -->
  <rect x="8" y="8" width="176" height="176" rx="32" fill="#0EA5A0" opacity="0.04"/>
  
  <!-- Node 1 - left (navy) -->
  <circle cx="68" cy="108" r="36" fill="none" stroke="#1B2A4A" stroke-width="5"/>
  <circle cx="68" cy="108" r="18" fill="#1B2A4A" opacity="0.08"/>
  
  <!-- Node 2 - top right (teal, larger - dominant for medical) -->
  <circle cx="118" cy="72" r="42" fill="none" stroke="#0EA5A0" stroke-width="6"/>
  <circle cx="118" cy="72" r="22" fill="#0EA5A0" opacity="0.1"/>
  
  <!-- Node 3 - bottom right (amber) -->
  <circle cx="118" cy="130" r="36" fill="none" stroke="#E8893C" stroke-width="5"/>
  <circle cx="118" cy="130" r="18" fill="#E8893C" opacity="0.08"/>
  
  <!-- Intersection highlights -->
  <circle cx="93" cy="88" r="7" fill="#0EA5A0" opacity="0.9"/>
  <circle cx="93" cy="120" r="7" fill="#E8893C" opacity="0.9"/>
  <circle cx="120" cy="101" r="7" fill="#0EA5A0" opacity="0.9"/>
  
  <!-- Connection lines -->
  <line x1="68" y1="108" x2="118" y2="72" stroke="#0EA5A0" stroke-width="2" opacity="0.3"/>
  <line x1="68" y1="108" x2="118" y2="130" stroke="#E8893C" stroke-width="2" opacity="0.3"/>
  <line x1="118" y1="72" x2="118" y2="130" stroke="#0EA5A0" stroke-width="2" opacity="0.3"/>
  
  <!-- "M" badge in bottom-right corner -->
  <circle cx="156" cy="156" r="18" fill="#0EA5A0"/>
  <text x="156" y="163" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">M</text>
</svg>
