<div class="timeout-warning-dialog">
  <div class="dialog-header">
    <mat-icon class="warning-icon">warning</mat-icon>
    <h2>Session Timeout Warning</h2>
  </div>

  <div class="dialog-content">
    <p class="warning-message">
      Your session is about to expire due to inactivity.
    </p>
    
    @if (timeRemaining$ | async; as timeRemaining) {
      <p class="time-remaining">
        Time remaining: <strong>{{ timeRemaining }} minute{{ timeRemaining !== 1 ? 's' : '' }}</strong>
      </p>
    }
    
    <p class="action-prompt">
      Would you like to stay logged in?
    </p>
  </div>

  <div class="dialog-actions">
    <button mat-raised-button color="primary" (click)="confirmActivity()">
      <mat-icon>check_circle</mat-icon>
      I'm Still Here
    </button>
    <button mat-button (click)="logout()">
      <mat-icon>logout</mat-icon>
      Logout Now
    </button>
  </div>
</div>
