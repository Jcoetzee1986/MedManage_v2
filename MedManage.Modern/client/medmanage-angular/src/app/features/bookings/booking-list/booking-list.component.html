<div class="booking-list-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Bookings</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <!-- Search Filters -->
      <form [formGroup]="searchForm" class="search-form" (ngSubmit)="onSearch()">
        <mat-form-field appearance="outline">
          <mat-label>Surname</mat-label>
          <input matInput formControlName="surname" placeholder="Search by surname">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Name</mat-label>
          <input matInput formControlName="name" placeholder="Search by name">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Member Number</mat-label>
          <input matInput formControlName="memberNumber" placeholder="Search by member #">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Travel Date From</mat-label>
          <input matInput [matDatepicker]="dateFromPicker" formControlName="dateFrom">
          <mat-datepicker-toggle matIconSuffix [for]="dateFromPicker"></mat-datepicker-toggle>
          <mat-datepicker #dateFromPicker></mat-datepicker>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Travel Date To</mat-label>
          <input matInput [matDatepicker]="dateToPicker" formControlName="dateTo">
          <mat-datepicker-toggle matIconSuffix [for]="dateToPicker"></mat-datepicker-toggle>
          <mat-datepicker #dateToPicker></mat-datepicker>
        </mat-form-field>

        <div class="search-actions">
          <button mat-raised-button color="primary" type="submit">
            <mat-icon>search</mat-icon> Search
          </button>
          <button mat-stroked-button type="button" (click)="onReset()">
            <mat-icon>clear</mat-icon> Reset
          </button>
        </div>
      </form>

      <!-- Toolbar -->
      <div class="toolbar">
        <button mat-raised-button color="accent" (click)="onNewBooking()">
          <mat-icon>add</mat-icon> New Booking
        </button>
      </div>

      <!-- Grid -->
      <app-data-table
        [columns]="tableColumnDefs"
        [data]="rowData"
        [totalCount]="totalCount"
        [pageSize]="pageSize"
        [pageIndex]="pageIndex"
        [loading]="loading"
        emptyMessage="No bookings found."
        (rowDblClick)="onRowDoubleClicked($event)"
        (pageChange)="onPageChange($event)">
      </app-data-table>
    </mat-card-content>
  </mat-card>
</div>
