<div class="tab-content">
  <div class="tab-header">
    <h3>Active Case Locks</h3>
    <button mat-raised-button color="warn" (click)="releaseAll()" [disabled]="locks.length === 0">
      <mat-icon>lock_open</mat-icon> Release All
    </button>
  </div>

  @if (locks.length > 0) {
    <table mat-table [dataSource]="locks" class="full-width-table">
      <ng-container matColumnDef="caseId">
        <th mat-header-cell *matHeaderCellDef>Case ID</th>
        <td mat-cell *matCellDef="let lock">{{ lock.caseId }}</td>
      </ng-container>
      <ng-container matColumnDef="userName">
        <th mat-header-cell *matHeaderCellDef>Locked By</th>
        <td mat-cell *matCellDef="let lock">{{ lock.userName }}</td>
      </ng-container>
      <ng-container matColumnDef="lockedAt">
        <th mat-header-cell *matHeaderCellDef>Locked At</th>
        <td mat-cell *matCellDef="let lock">{{ lock.lockedAt | date:'medium' }}</td>
      </ng-container>
      <ng-container matColumnDef="lastActivity">
        <th mat-header-cell *matHeaderCellDef>Last Activity</th>
        <td mat-cell *matCellDef="let lock">{{ lock.lastActivity | date:'medium' }}</td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let lock">
          <button mat-icon-button color="warn" (click)="releaseLock(lock)" matTooltip="Release Lock">
            <mat-icon>lock_open</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  }

  @if (locks.length === 0 && !loading) {
    <p class="empty-message">No active case locks.</p>
  }
</div>
