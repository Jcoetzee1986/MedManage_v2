<div class="provider-list-container">
  <!-- Toolbar -->
  <mat-toolbar class="list-toolbar">
    <span class="toolbar-title">Provider Lookup</span>
    <span class="toolbar-spacer"></span>
    <button mat-raised-button color="primary" (click)="onOpenSelected()" [disabled]="!selectedProvider">
      <mat-icon>open_in_new</mat-icon> Open
    </button>
    <button mat-raised-button color="primary" (click)="onSearch()">
      <mat-icon>search</mat-icon> Search
    </button>
    <button mat-raised-button color="accent" (click)="onNewProvider()">
      <mat-icon>person_add</mat-icon> Add New
    </button>
  </mat-toolbar>

  <!-- Search Filters -->
  <mat-card class="search-card">
    <mat-card-content>
      <form [formGroup]="searchForm" (ngSubmit)="onSearch()" class="search-form" (keydown)="onSearchKeydown($event)">
        <div class="search-row">
          <mat-form-field appearance="outline">
            <mat-label>Surname</mat-label>
            <input matInput formControlName="lastName" placeholder="Search by surname">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Name</mat-label>
            <input matInput formControlName="firstName" placeholder="Search by name">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Practice Name</mat-label>
            <input matInput formControlName="practiceName" placeholder="Search by practice name">
          </mat-form-field>
        </div>

        <div class="search-row">
          <mat-form-field appearance="outline">
            <mat-label>Practice Number</mat-label>
            <input matInput formControlName="providerNumber" placeholder="Search by practice number">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Speciality</mat-label>
            <input matInput formControlName="speciality" placeholder="Search by speciality">
          </mat-form-field>
        </div>

        <div class="search-actions">
          <button mat-stroked-button type="button" (click)="onReset()">
            <mat-icon>clear</mat-icon> Reset
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>

  <!-- Results Table -->
  <div class="table-container">
    <div class="loading-shade" *ngIf="loading">
      <mat-spinner diameter="40"></mat-spinner>
    </div>

    <table mat-table [dataSource]="dataSource" matSort (matSortChange)="onSortChange($event)" class="provider-table">
      <ng-container matColumnDef="providerNumber">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Provider #</th>
        <td mat-cell *matCellDef="let row">{{ row.providerNumber }}</td>
      </ng-container>

      <ng-container matColumnDef="practiceName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Practice Name</th>
        <td mat-cell *matCellDef="let row">{{ row.practiceName }}</td>
      </ng-container>

      <ng-container matColumnDef="firstName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>First Name</th>
        <td mat-cell *matCellDef="let row">{{ row.firstName }}</td>
      </ng-container>

      <ng-container matColumnDef="lastName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Last Name</th>
        <td mat-cell *matCellDef="let row">{{ row.lastName }}</td>
      </ng-container>

      <ng-container matColumnDef="specialityName">
        <th mat-header-cell *matHeaderCellDef>Speciality</th>
        <td mat-cell *matCellDef="let row">{{ row.specialityName }}</td>
      </ng-container>

      <ng-container matColumnDef="contactNumber">
        <th mat-header-cell *matHeaderCellDef>Contact</th>
        <td mat-cell *matCellDef="let row">{{ row.contactNumber }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"
          (click)="onRowClick(row)"
          (dblclick)="onRowDoubleClick(row)"
          [class.selected-row]="selectedProvider?.id === row.id"
          class="clickable-row"></tr>
    </table>

    <mat-paginator
      [length]="totalCount"
      [pageSize]="pageSize"
      [pageIndex]="pageIndex"
      [pageSizeOptions]="[10, 25, 50, 100]"
      (page)="onPageChange($event)"
      showFirstLastButtons>
    </mat-paginator>
  </div>
</div>
