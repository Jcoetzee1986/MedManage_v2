<div class="tab-content">
  <div class="tab-header">
    <h3>Exclusions</h3>
    <button mat-raised-button color="primary" (click)="onShowAddForm()">
      <mat-icon>add</mat-icon> Add Exclusion
    </button>
  </div>

  @if (showAddForm) {
    <div class="add-form">
      <form [formGroup]="addForm" (ngSubmit)="onSave()">
        <div class="form-grid">
          @if (!editingItem) {
            <app-reference-data-dropdown
              resource="exclusion"
              label="Exclusion"
              formControlName="exclusionId"
              class="span-2">
            </app-reference-data-dropdown>
          } @else {
            <mat-form-field appearance="outline" class="span-2">
              <mat-label>Exclusion</mat-label>
              <input matInput [value]="editingItem.exclusionName || ''" disabled>
            </mat-form-field>
          }

          <mat-form-field appearance="outline" class="span-2">
            <mat-label>Comment</mat-label>
            <input matInput formControlName="comment">
          </mat-form-field>
        </div>
        <div class="form-actions">
          <button mat-raised-button color="primary" type="submit">
            {{ editingItem ? 'Update' : 'Save' }}
          </button>
          <button mat-stroked-button type="button" (click)="onCancel()">Cancel</button>
        </div>
      </form>
    </div>
  }

  @if (items.length > 0) {
    <table mat-table [dataSource]="items" class="full-width-table">
      <ng-container matColumnDef="exclusionName">
        <th mat-header-cell *matHeaderCellDef>Exclusion</th>
        <td mat-cell *matCellDef="let item">{{ item.exclusionName }}</td>
      </ng-container>

      <ng-container matColumnDef="comment">
        <th mat-header-cell *matHeaderCellDef>Comment</th>
        <td mat-cell *matCellDef="let item">{{ item.comment }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let item">
          <button mat-icon-button (click)="onEdit(item)" aria-label="Edit">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="onDelete(item)" aria-label="Delete">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  }

  @if (items.length === 0 && !showAddForm) {
    <p class="empty-message">No exclusions assigned.</p>
  }
</div>
