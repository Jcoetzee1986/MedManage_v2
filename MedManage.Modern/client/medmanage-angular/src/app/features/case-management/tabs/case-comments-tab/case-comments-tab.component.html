<div class="tab-content">
  <h3>Comments</h3>

  <!-- Add comment form -->
  <div class="add-comment-form">
    <div class="editor-toolbar">
      <button mat-icon-button type="button" (click)="execCmd('bold')" matTooltip="Bold">
        <mat-icon>format_bold</mat-icon>
      </button>
      <button mat-icon-button type="button" (click)="execCmd('italic')" matTooltip="Italic">
        <mat-icon>format_italic</mat-icon>
      </button>
      <button mat-icon-button type="button" (click)="execCmd('underline')" matTooltip="Underline">
        <mat-icon>format_underlined</mat-icon>
      </button>
      <button mat-icon-button type="button" (click)="execCmd('insertUnorderedList')" matTooltip="Bullet List">
        <mat-icon>format_list_bulleted</mat-icon>
      </button>
      <button mat-icon-button type="button" (click)="execCmd('insertOrderedList')" matTooltip="Numbered List">
        <mat-icon>format_list_numbered</mat-icon>
      </button>
    </div>
    <div #editorEl
         class="comment-editor"
         contenteditable="true"
         placeholder="Add a comment..."
         (input)="onEditorInput()">
    </div>
    <button mat-raised-button color="primary" (click)="onAdd()" [disabled]="!editorContent">
      <mat-icon>send</mat-icon> Post
    </button>
  </div>

  <!-- Comments list -->
  <div class="comments-list">
    @for (item of items; track item.id) {
      <mat-card class="comment-card">
        <mat-card-header>
          <mat-card-subtitle>{{ item.createdBy }} — {{ item.dateCreated | date:'medium' }}</mat-card-subtitle>
        </mat-card-header>
        <mat-card-content>
          <div [innerHTML]="item.text"></div>
        </mat-card-content>
        <mat-card-actions align="end">
          <button mat-icon-button color="warn" (click)="onDelete(item)" aria-label="Delete comment">
            <mat-icon>delete</mat-icon>
          </button>
        </mat-card-actions>
      </mat-card>
    }
  </div>

  @if (items.length === 0) {
    <p class="empty-message">No comments yet.</p>
  }
</div>
