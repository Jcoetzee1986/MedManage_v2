<div class="case-form-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>New Case</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="form-row">
          <mat-form-field appearance="outline">
            <mat-label>Auth Number</mat-label>
            <input matInput formControlName="authNumber">
          </mat-form-field>

          <app-reference-data-dropdown
            resource="case-status"
            label="Status"
            formControlName="caseStatusId">
          </app-reference-data-dropdown>

          <app-reference-data-dropdown
            resource="case-type"
            label="Type"
            formControlName="caseTypeId">
          </app-reference-data-dropdown>
        </div>

        <div class="form-row">
          <app-reference-data-dropdown
            resource="case-category"
            label="Category"
            formControlName="caseCategoryId">
          </app-reference-data-dropdown>

          <mat-form-field appearance="outline">
            <mat-label>Member ID</mat-label>
            <input matInput type="number" formControlName="memberId">
          </mat-form-field>
        </div>

        <div class="form-row">
          <mat-form-field appearance="outline">
            <mat-label>Refer To (Provider ID)</mat-label>
            <input matInput type="number" formControlName="referToId">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Refer From (Provider ID)</mat-label>
            <input matInput type="number" formControlName="referFromId">
          </mat-form-field>
        </div>

        <div class="form-row">
          <mat-form-field appearance="outline">
            <mat-label>Date of Service</mat-label>
            <input matInput [matDatepicker]="servicePicker" formControlName="dateOfService">
            <mat-datepicker-toggle matIconSuffix [for]="servicePicker"></mat-datepicker-toggle>
            <mat-datepicker #servicePicker></mat-datepicker>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Date Admitted</mat-label>
            <input matInput [matDatepicker]="admitPicker" formControlName="dateAdmitted">
            <mat-datepicker-toggle matIconSuffix [for]="admitPicker"></mat-datepicker-toggle>
            <mat-datepicker #admitPicker></mat-datepicker>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Date Discharged</mat-label>
            <input matInput [matDatepicker]="dischargePicker" formControlName="dateDischarged">
            <mat-datepicker-toggle matIconSuffix [for]="dischargePicker"></mat-datepicker-toggle>
            <mat-datepicker #dischargePicker></mat-datepicker>
          </mat-form-field>
        </div>

        <div class="form-row">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Diagnosis</mat-label>
            <textarea matInput formControlName="diagnosis" rows="3"></textarea>
          </mat-form-field>
        </div>

        <div class="form-row">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Comments</mat-label>
            <textarea matInput formControlName="comments" rows="2"></textarea>
          </mat-form-field>
        </div>

        <div class="form-actions">
          <button mat-raised-button color="primary" type="submit">
            <mat-icon>save</mat-icon> Create Case
          </button>
          <button mat-stroked-button type="button" (click)="onCancel()">Cancel</button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
