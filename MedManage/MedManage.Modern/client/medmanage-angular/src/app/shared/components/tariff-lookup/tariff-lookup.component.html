<h2 mat-dialog-title>{{ title }}</h2>

<mat-dialog-content>
  <div class="search-field">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Search tariff code or description</mat-label>
      <input matInput [formControl]="searchControl" placeholder="Type at least 2 characters..." autocomplete="off">
      <mat-icon matPrefix>search</mat-icon>
      <mat-icon matSuffix *ngIf="loading">hourglass_empty</mat-icon>
    </mat-form-field>
  </div>

  <div class="results-container">
    <mat-spinner diameter="32" *ngIf="loading && results.length === 0"></mat-spinner>

    <table mat-table [dataSource]="results" class="full-width-table" *ngIf="results.length > 0">
      <ng-container matColumnDef="code">
        <th mat-header-cell *matHeaderCellDef>Code</th>
        <td mat-cell *matCellDef="let row">{{ row.code }}</td>
      </ng-container>

      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Description</th>
        <td mat-cell *matCellDef="let row">{{ row.description }}</td>
      </ng-container>

      <ng-container matColumnDef="category">
        <th mat-header-cell *matHeaderCellDef>Category</th>
        <td mat-cell *matCellDef="let row">{{ row.category }}</td>
      </ng-container>

      <ng-container matColumnDef="currentRate">
        <th mat-header-cell *matHeaderCellDef>Rate</th>
        <td mat-cell *matCellDef="let row">
          {{ row.currentRate != null ? 'R ' + (row.currentRate | number:'1.2-2') : '-' }}
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row
          *matRowDef="let row; columns: displayedColumns;"
          (click)="onRowSelect(row)"
          [class.selected-row]="isSelected(row)"
          role="button"
          [attr.aria-selected]="isSelected(row)">
      </tr>
    </table>

    <p *ngIf="!loading && results.length === 0 && searchControl.value && searchControl.value!.length >= 2" class="no-results">
      No tariff codes found matching your search.
    </p>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="onConfirm()" [disabled]="!selectedItem">
    Select
  </button>
</mat-dialog-actions>
