@if (loading) {
  <div class="table-loading">
    <mat-spinner diameter="32"></mat-spinner>
  </div>
}

@if (!loading && data.length === 0) {
  <p class="no-data">{{ emptyMessage }}</p>
}

@if (data.length > 0) {
  <div class="table-scroll">
    <table mat-table [dataSource]="data" matSort (matSortChange)="onSortChange($event)">
      @for (col of columns; track col.field) {
        <ng-container [matColumnDef]="col.field">
          <th mat-header-cell *matHeaderCellDef
              [mat-sort-header]="sortable && col.sortable !== false ? col.field : ''"
              [disabled]="!sortable || col.sortable === false"
              [style.width]="col.width || 'auto'"
              [style.text-align]="col.align || 'left'">
            {{ col.header }}
          </th>
          <td mat-cell *matCellDef="let row"
              [style.text-align]="col.align || 'left'">
            {{ getCellValue(row, col) }}
          </td>
        </ng-container>
      }

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"
          [class.selected-row]="isSelected(row)"
          [class.clickable-row]="selectable"
          (click)="onRowClick(row)"
          (dblclick)="onRowDblClick(row)"></tr>
    </table>
  </div>
}

@if (showPaginator) {
  <mat-paginator
    [length]="totalCount"
    [pageSize]="pageSize"
    [pageIndex]="pageIndex"
    [pageSizeOptions]="pageSizeOptions"
    (page)="onPageChange($event)"
    showFirstLastButtons>
  </mat-paginator>
}
