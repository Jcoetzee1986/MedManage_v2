<h2 mat-dialog-title>{{ title }}</h2>

<mat-dialog-content>
  <div class="search-row">
    <mat-form-field appearance="outline">
      <mat-label>Code</mat-label>
      <input matInput
             [formControl]="codeControl"
             placeholder="Code..."
             autocomplete="off"
             (keyup.enter)="onManualSearch()">
      <mat-icon matPrefix>search</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline" style="flex: 2">
      <mat-label>Description</mat-label>
      <input matInput
             [formControl]="descriptionControl"
             placeholder="Description..."
             autocomplete="off"
             (keyup.enter)="onManualSearch()">
    </mat-form-field>

    <button mat-raised-button color="primary" (click)="onManualSearch()" [disabled]="loading">
      Search
    </button>
  </div>

  <div class="results-container">
    <mat-spinner diameter="32" *ngIf="loading && results.length === 0"></mat-spinner>

    <table mat-table [dataSource]="results" class="full-width-table" *ngIf="results.length > 0">
      <ng-container matColumnDef="code">
        <th mat-header-cell *matHeaderCellDef>Code</th>
        <td mat-cell *matCellDef="let row">{{ row.code }}</td>
      </ng-container>

      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Description</th>
        <td mat-cell *matCellDef="let row">{{ row.description }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row
          *matRowDef="let row; columns: displayedColumns;"
          (click)="onRowSelect(row)"
          (dblclick)="onRowDoubleClick(row)"
          [class.selected-row]="isSelected(row)"
          role="button"
          tabindex="0"
          [attr.aria-selected]="isSelected(row)">
      </tr>
    </table>

    <p *ngIf="!loading && results.length === 0 && searched" class="no-results">
      No codes found matching your search.
    </p>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="onConfirm()" [disabled]="!selectedItem">
    Select
  </button>
</mat-dialog-actions>
