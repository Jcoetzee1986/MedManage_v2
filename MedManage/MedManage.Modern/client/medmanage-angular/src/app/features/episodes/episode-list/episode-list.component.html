<div class="episode-list-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Episodes</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <!-- Search Filters -->
      <form [formGroup]="searchForm" class="search-form" (ngSubmit)="onSearch()">
        <mat-form-field appearance="outline">
          <mat-label>Episode Name</mat-label>
          <input matInput formControlName="episodeName" placeholder="Search by description">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Member ID</mat-label>
          <input matInput type="number" formControlName="memberId" placeholder="Member ID">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Date From</mat-label>
          <input matInput [matDatepicker]="dateFromPicker" formControlName="dateFrom">
          <mat-datepicker-toggle matIconSuffix [for]="dateFromPicker"></mat-datepicker-toggle>
          <mat-datepicker #dateFromPicker></mat-datepicker>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Date To</mat-label>
          <input matInput [matDatepicker]="dateToPicker" formControlName="dateTo">
          <mat-datepicker-toggle matIconSuffix [for]="dateToPicker"></mat-datepicker-toggle>
          <mat-datepicker #dateToPicker></mat-datepicker>
        </mat-form-field>

        <div class="search-actions">
          <button mat-raised-button color="primary" type="submit">
            <mat-icon>search</mat-icon> Search
          </button>
          <button mat-stroked-button type="button" (click)="onReset()">
            <mat-icon>clear</mat-icon> Reset
          </button>
        </div>
      </form>

      <!-- Toolbar -->
      <div class="toolbar">
        <button mat-raised-button color="accent" (click)="onNewEpisode()">
          <mat-icon>add</mat-icon> New Episode
        </button>
      </div>

      <!-- Grid -->
      <ag-grid-angular
        class="ag-theme-material episode-grid"
        [rowData]="rowData"
        [columnDefs]="columnDefs"
        [defaultColDef]="defaultColDef"
        [animateRows]="true"
        (gridReady)="onGridReady($event)"
        (rowDoubleClicked)="onRowDoubleClicked($event)">
      </ag-grid-angular>

      <!-- Server-side Pagination -->
      <mat-paginator
        [length]="totalCount"
        [pageSize]="pageSize"
        [pageIndex]="pageIndex"
        [pageSizeOptions]="[10, 25, 50, 100]"
        (page)="onPageChange($event)"
        showFirstLastButtons>
      </mat-paginator>
    </mat-card-content>
  </mat-card>
</div>
