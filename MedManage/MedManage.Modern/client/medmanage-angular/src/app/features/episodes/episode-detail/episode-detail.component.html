<div class="episode-detail-container">
  <!-- Episode Form -->
  <mat-card>
    <mat-card-header>
      <mat-card-title>{{ isNew ? 'New Episode' : 'Episode Details' }}</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="episodeForm" class="episode-form">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Description</mat-label>
          <input matInput formControlName="episodeDescription" placeholder="Episode description">
        </mat-form-field>

        <div class="form-row">
          <mat-form-field appearance="outline">
            <mat-label>Member ID</mat-label>
            <input matInput type="number" formControlName="memberId" placeholder="Member ID">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Date Created</mat-label>
            <input matInput formControlName="dateCreated" placeholder="YYYY-MM-DD">
          </mat-form-field>
        </div>
      </form>
    </mat-card-content>

    <mat-card-actions align="end">
      <button mat-stroked-button (click)="onBack()">
        <mat-icon>arrow_back</mat-icon> Back
      </button>
      <button mat-raised-button color="primary" (click)="onSave()" [disabled]="episodeForm.invalid">
        <mat-icon>save</mat-icon> {{ isNew ? 'Create' : 'Save' }}
      </button>
    </mat-card-actions>
  </mat-card>

  <!-- Linked Cases Section (only show when editing existing episode) -->
  <mat-card *ngIf="!isNew" class="cases-card">
    <mat-card-header>
      <mat-card-title>Linked Cases</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <!-- Link Case Form -->
      <form [formGroup]="linkCaseForm" class="link-case-form" (ngSubmit)="onLinkCase()">
        <mat-form-field appearance="outline">
          <mat-label>Case ID</mat-label>
          <input matInput type="number" formControlName="caseId" placeholder="Enter Case ID to link">
        </mat-form-field>
        <button mat-raised-button color="accent" type="submit" [disabled]="linkCaseForm.invalid">
          <mat-icon>link</mat-icon> Link Case
        </button>
      </form>

      <mat-divider></mat-divider>

      <!-- Cases Grid -->
      <ag-grid-angular
        class="ag-theme-material cases-grid"
        [rowData]="linkedCases"
        [columnDefs]="caseColumnDefs"
        [defaultColDef]="defaultColDef"
        [animateRows]="true"
        [pagination]="true"
        [paginationPageSize]="10"
        (gridReady)="onGridReady($event)">
      </ag-grid-angular>
    </mat-card-content>
  </mat-card>
</div>
