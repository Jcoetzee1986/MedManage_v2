<div class="dashboard">
  <div class="dashboard-header">
    <h1>MedManage Dashboard</h1>
    <app-client-switcher></app-client-switcher>
  </div>
  <p>Welcome to the modernized MedManage application!</p>
  <div class="stats">
    <mat-card class="stat-card">
      <h3>Cases</h3>
      <p class="stat-value">Loading...</p>
    </mat-card>
    <mat-card class="stat-card">
      <h3>Members</h3>
      <p class="stat-value">Loading...</p>
    </mat-card>
    <mat-card class="stat-card">
      <h3>Pending Billing</h3>
      <p class="stat-value">Loading...</p>
    </mat-card>
  </div>
  <div class="actions">
    <button mat-raised-button color="primary" (click)="goToMyCases()">
      <mat-icon>assignment_ind</mat-icon> My Cases
    </button>
  </div>
</div>
