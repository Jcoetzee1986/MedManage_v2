<div class="tab-content">
  <div class="tab-header">
    <h3>Medical Aid Product History</h3>
    <button mat-raised-button color="primary" (click)="onAdd()" *ngIf="!showForm">
      <mat-icon>add</mat-icon> Add
    </button>
  </div>

  <!-- Add/Edit Form -->
  <div class="inline-form" *ngIf="showForm">
    <form [formGroup]="form" (ngSubmit)="onSave()">
      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>Medical Aid Product ID</mat-label>
          <input matInput formControlName="medicalAidProductId" type="number" required>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Date From</mat-label>
          <input matInput [matDatepicker]="fromPicker" formControlName="dateFrom">
          <mat-datepicker-toggle matIconSuffix [for]="fromPicker"></mat-datepicker-toggle>
          <mat-datepicker #fromPicker></mat-datepicker>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Date To</mat-label>
          <input matInput [matDatepicker]="toPicker" formControlName="dateTo">
          <mat-datepicker-toggle matIconSuffix [for]="toPicker"></mat-datepicker-toggle>
          <mat-datepicker #toPicker></mat-datepicker>
        </mat-form-field>
      </div>

      <div class="form-actions">
        <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">Save</button>
        <button mat-stroked-button type="button" (click)="onCancel()">Cancel</button>
      </div>
    </form>
  </div>

  <!-- Table -->
  <table mat-table [dataSource]="items" class="full-width-table" *ngIf="items.length > 0">
    <ng-container matColumnDef="medicalAidName">
      <th mat-header-cell *matHeaderCellDef>Medical Aid</th>
      <td mat-cell *matCellDef="let row">{{ row.medicalAidName }}</td>
    </ng-container>

    <ng-container matColumnDef="medicalAidProductName">
      <th mat-header-cell *matHeaderCellDef>Product</th>
      <td mat-cell *matCellDef="let row">{{ row.medicalAidProductName }}</td>
    </ng-container>

    <ng-container matColumnDef="dateFrom">
      <th mat-header-cell *matHeaderCellDef>Date From</th>
      <td mat-cell *matCellDef="let row">{{ row.dateFrom | date:'shortDate' }}</td>
    </ng-container>

    <ng-container matColumnDef="dateTo">
      <th mat-header-cell *matHeaderCellDef>Date To</th>
      <td mat-cell *matCellDef="let row">{{ row.dateTo | date:'shortDate' }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let row">
        <button mat-icon-button (click)="onEdit(row)" aria-label="Edit">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="onDelete(row)" aria-label="Delete">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <p *ngIf="items.length === 0 && !showForm" class="no-data">No medical aid product history.</p>
</div>
