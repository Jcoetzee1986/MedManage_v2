<div class="tab-content">
  <div class="tab-header">
    <h3>Member Notes</h3>
    <div class="tab-actions">
      <button mat-raised-button color="primary" (click)="onAdd()" *ngIf="!showForm">
        <mat-icon>add</mat-icon> Add Note
      </button>
    </div>
  </div>

  <!-- Add/Edit Form -->
  <div class="inline-form" *ngIf="showForm">
    <form [formGroup]="form" (ngSubmit)="onSave()">
      <div class="form-row">
        <mat-form-field appearance="outline" class="note-field">
          <mat-label>Note</mat-label>
          <textarea matInput formControlName="note" rows="4" required></textarea>
          <mat-error *ngIf="form.controls.note.hasError('required')">Required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Note Date</mat-label>
          <input matInput [matDatepicker]="noteDatePicker" formControlName="noteDate">
          <mat-datepicker-toggle matIconSuffix [for]="noteDatePicker"></mat-datepicker-toggle>
          <mat-datepicker #noteDatePicker></mat-datepicker>
        </mat-form-field>
      </div>

      <div class="form-actions">
        <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
          {{ editingId ? 'Update' : 'Add' }}
        </button>
        <button mat-stroked-button type="button" (click)="onCancel()">Cancel</button>
      </div>
    </form>
  </div>

  <!-- Notes Grid -->
  <table mat-table [dataSource]="items" class="full-width-table" *ngIf="items.length > 0">
    <ng-container matColumnDef="note">
      <th mat-header-cell *matHeaderCellDef>Note</th>
      <td mat-cell *matCellDef="let row">{{ row.note }}</td>
    </ng-container>

    <ng-container matColumnDef="noteDate">
      <th mat-header-cell *matHeaderCellDef>Note Date</th>
      <td mat-cell *matCellDef="let row">{{ row.noteDate | date:'shortDate' }}</td>
    </ng-container>

    <ng-container matColumnDef="createdBy">
      <th mat-header-cell *matHeaderCellDef>Created By</th>
      <td mat-cell *matCellDef="let row">{{ row.createdBy }}</td>
    </ng-container>

    <ng-container matColumnDef="dateCreated">
      <th mat-header-cell *matHeaderCellDef>Date Created</th>
      <td mat-cell *matCellDef="let row">{{ row.dateCreated | date:'short' }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let row">
        <button mat-icon-button (click)="onEdit(row)" aria-label="Edit note">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="onDelete(row)" aria-label="Delete note">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <p *ngIf="items.length === 0 && !showForm" class="no-data">No notes recorded.</p>
</div>
