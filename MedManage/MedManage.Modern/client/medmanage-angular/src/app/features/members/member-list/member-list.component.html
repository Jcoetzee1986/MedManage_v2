<div class="member-list-container">
  <!-- Search Filters -->
  <mat-card class="search-card">
    <mat-card-header>
      <mat-card-title>Member Search</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="searchForm" (ngSubmit)="onSearch()" class="search-form">
        <div class="search-row">
          <mat-form-field appearance="outline">
            <mat-label>Member Number</mat-label>
            <input matInput formControlName="memberNumber" placeholder="Search by member number">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>First Name</mat-label>
            <input matInput formControlName="firstName" placeholder="Search by first name">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Last Name</mat-label>
            <input matInput formControlName="lastName" placeholder="Search by last name">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>ID Number</mat-label>
            <input matInput formControlName="idNumber" placeholder="Search by ID number">
          </mat-form-field>
        </div>

        <div class="search-actions">
          <button mat-raised-button color="primary" type="submit">
            <mat-icon>search</mat-icon> Search
          </button>
          <button mat-stroked-button type="button" (click)="onReset()">
            <mat-icon>clear</mat-icon> Reset
          </button>
          <button mat-raised-button color="accent" type="button" (click)="onNewMember()">
            <mat-icon>add</mat-icon> New Member
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>

  <!-- Results Table -->
  <div class="table-container">
    <div class="loading-shade" *ngIf="loading">
      <mat-spinner diameter="40"></mat-spinner>
    </div>

    <table mat-table [dataSource]="dataSource" matSort (matSortChange)="onSortChange($event)" class="member-table">
      <ng-container matColumnDef="memberNumber">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Member #</th>
        <td mat-cell *matCellDef="let row">{{ row.memberNumber }}</td>
      </ng-container>

      <ng-container matColumnDef="firstName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>First Name</th>
        <td mat-cell *matCellDef="let row">{{ row.firstName }}</td>
      </ng-container>

      <ng-container matColumnDef="lastName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Last Name</th>
        <td mat-cell *matCellDef="let row">{{ row.lastName }}</td>
      </ng-container>

      <ng-container matColumnDef="idNumber">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>ID Number</th>
        <td mat-cell *matCellDef="let row">{{ row.idNumber }}</td>
      </ng-container>

      <ng-container matColumnDef="medicalAidName">
        <th mat-header-cell *matHeaderCellDef>Medical Aid</th>
        <td mat-cell *matCellDef="let row">{{ row.medicalAidName }}</td>
      </ng-container>

      <ng-container matColumnDef="memberStatusName">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let row">{{ row.memberStatusName }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" (click)="onRowClick(row)" class="clickable-row"></tr>
    </table>

    <mat-paginator
      [length]="totalCount"
      [pageSize]="pageSize"
      [pageIndex]="pageIndex"
      [pageSizeOptions]="[10, 25, 50, 100]"
      (page)="onPageChange($event)"
      showFirstLastButtons>
    </mat-paginator>
  </div>
</div>
