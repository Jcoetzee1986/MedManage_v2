<div class="member-list-container">
  <!-- Toolbar -->
  <mat-toolbar class="list-toolbar">
    <span class="toolbar-title">Member Lookup</span>
    <span class="toolbar-spacer"></span>
    <button mat-raised-button color="primary" (click)="onOpenSelected()" [disabled]="dataSource.length === 0">
      <mat-icon>open_in_new</mat-icon> Open
    </button>
    <button mat-raised-button color="primary" (click)="onSearch()">
      <mat-icon>search</mat-icon> Search
    </button>
    <button mat-raised-button color="accent" (click)="onNewMember()">
      <mat-icon>person_add</mat-icon> Add New Member
    </button>
  </mat-toolbar>

  <!-- Search Filters -->
  <mat-card class="search-card">
    <mat-card-content>
      <form [formGroup]="searchForm" (ngSubmit)="onSearch()" class="search-form" (keydown)="onSearchKeydown($event)">
        <div class="search-row">
          <mat-form-field appearance="outline">
            <mat-label>Surname</mat-label>
            <input matInput formControlName="lastName" placeholder="Search by surname">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Name</mat-label>
            <input matInput formControlName="firstName" placeholder="Search by name">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Member Number</mat-label>
            <input matInput formControlName="memberNumber" placeholder="Search by member number">
          </mat-form-field>
        </div>

        <div class="search-row">
          <mat-form-field appearance="outline">
            <mat-label>Passport Number</mat-label>
            <input matInput formControlName="passportNumber" placeholder="Search by passport number">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>ID Number</mat-label>
            <input matInput formControlName="idNumber" placeholder="Search by ID number">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Date Of Birth</mat-label>
            <input matInput [matDatepicker]="dobSearchPicker" formControlName="dateOfBirth">
            <mat-datepicker-toggle matIconSuffix [for]="dobSearchPicker"></mat-datepicker-toggle>
            <mat-datepicker #dobSearchPicker></mat-datepicker>
          </mat-form-field>
        </div>

        <div class="search-actions">
          <button mat-stroked-button type="button" (click)="onReset()">
            <mat-icon>clear</mat-icon> Reset
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>

  <!-- Results Table -->
  <div class="table-container">
    <div class="loading-shade" *ngIf="loading">
      <mat-spinner diameter="40"></mat-spinner>
    </div>

    <table mat-table [dataSource]="dataSource" matSort (matSortChange)="onSortChange($event)" class="member-table">
      <ng-container matColumnDef="memberNumber">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Member #</th>
        <td mat-cell *matCellDef="let row">{{ row.memberNumber }}</td>
      </ng-container>

      <ng-container matColumnDef="lastName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Surname</th>
        <td mat-cell *matCellDef="let row">{{ row.lastName }}</td>
      </ng-container>

      <ng-container matColumnDef="firstName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
        <td mat-cell *matCellDef="let row">{{ row.firstName }}</td>
      </ng-container>

      <ng-container matColumnDef="idNumber">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>ID Number</th>
        <td mat-cell *matCellDef="let row">{{ row.idNumber }}</td>
      </ng-container>

      <ng-container matColumnDef="medicalAidName">
        <th mat-header-cell *matHeaderCellDef>Medical Aid</th>
        <td mat-cell *matCellDef="let row">{{ row.medicalAidName }}</td>
      </ng-container>

      <ng-container matColumnDef="memberStatusName">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let row">{{ row.memberStatusName }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"
          (click)="onRowClick(row)"
          (dblclick)="onRowDoubleClick(row)"
          class="clickable-row"></tr>
    </table>

    <mat-paginator
      [length]="totalCount"
      [pageSize]="pageSize"
      [pageIndex]="pageIndex"
      [pageSizeOptions]="[10, 25, 50, 100]"
      (page)="onPageChange($event)"
      showFirstLastButtons>
    </mat-paginator>
  </div>
</div>
