<div class="tab-content">
  <h3>Comments</h3>

  <!-- Add comment form -->
  <form [formGroup]="addForm" (ngSubmit)="onAdd()" class="add-comment-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Add a comment...</mat-label>
      <textarea matInput formControlName="text" rows="2"></textarea>
    </mat-form-field>
    <button mat-raised-button color="primary" type="submit">
      <mat-icon>send</mat-icon> Post
    </button>
  </form>

  <!-- Comments list -->
  <div class="comments-list">
    <mat-card *ngFor="let item of items" class="comment-card">
      <mat-card-header>
        <mat-card-subtitle>{{ item.createdBy }} — {{ item.dateCreated | date:'medium' }}</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <p>{{ item.text }}</p>
      </mat-card-content>
      <mat-card-actions align="end">
        <button mat-icon-button color="warn" (click)="onDelete(item)" aria-label="Delete comment">
          <mat-icon>delete</mat-icon>
        </button>
      </mat-card-actions>
    </mat-card>
  </div>

  <p *ngIf="items.length === 0" class="empty-message">No comments yet.</p>
</div>
