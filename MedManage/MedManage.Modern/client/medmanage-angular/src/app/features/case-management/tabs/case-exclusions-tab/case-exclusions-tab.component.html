<div class="tab-content">
  <div class="tab-header">
    <h3>Exclusions</h3>
    <button mat-raised-button color="primary" (click)="showAddForm = !showAddForm">
      <mat-icon>add</mat-icon> Add Exclusion
    </button>
  </div>

  <div class="add-form" *ngIf="showAddForm">
    <form [formGroup]="addForm" (ngSubmit)="onAdd()">
      <div class="form-row">
        <app-reference-data-dropdown
          resource="exclusion"
          label="Exclusion"
          formControlName="exclusionId">
        </app-reference-data-dropdown>

        <mat-form-field appearance="outline">
          <mat-label>Comment</mat-label>
          <input matInput formControlName="comment">
        </mat-form-field>
      </div>
      <div class="form-actions">
        <button mat-raised-button color="primary" type="submit">Save</button>
        <button mat-stroked-button type="button" (click)="showAddForm = false">Cancel</button>
      </div>
    </form>
  </div>

  <table mat-table [dataSource]="items" class="full-width">
    <ng-container matColumnDef="exclusionName">
      <th mat-header-cell *matHeaderCellDef>Exclusion</th>
      <td mat-cell *matCellDef="let item">{{ item.exclusionName }}</td>
    </ng-container>

    <ng-container matColumnDef="comment">
      <th mat-header-cell *matHeaderCellDef>Comment</th>
      <td mat-cell *matCellDef="let item">{{ item.comment }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let item">
        <button mat-icon-button color="warn" (click)="onDelete(item)" aria-label="Delete">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <p *ngIf="items.length === 0" class="empty-message">No exclusions assigned.</p>
</div>
