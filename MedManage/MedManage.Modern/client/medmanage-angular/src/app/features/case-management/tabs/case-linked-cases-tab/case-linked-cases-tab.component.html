<div class="tab-content">
  <div class="tab-header">
    <h3>Linked Cases</h3>
    <button mat-raised-button color="primary" (click)="showAddForm = !showAddForm">
      <mat-icon>link</mat-icon> Link Case
    </button>
  </div>

  <div class="add-form" *ngIf="showAddForm">
    <form [formGroup]="addForm" (ngSubmit)="onAdd()">
      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>Case ID to Link</mat-label>
          <input matInput type="number" formControlName="childCaseId" placeholder="Enter case ID">
        </mat-form-field>
      </div>
      <div class="form-actions">
        <button mat-raised-button color="primary" type="submit">Link</button>
        <button mat-stroked-button type="button" (click)="showAddForm = false">Cancel</button>
      </div>
    </form>
  </div>

  <table mat-table [dataSource]="items" class="full-width">
    <ng-container matColumnDef="linkedCaseNumber">
      <th mat-header-cell *matHeaderCellDef>Case Number</th>
      <td mat-cell *matCellDef="let item">
        <a class="link" (click)="onNavigate(item)">{{ item.linkedCaseNumber }}</a>
      </td>
    </ng-container>
    <ng-container matColumnDef="linkedCaseMember">
      <th mat-header-cell *matHeaderCellDef>Member</th>
      <td mat-cell *matCellDef="let item">{{ item.linkedCaseMember }}</td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let item">
        <button mat-icon-button color="warn" (click)="onDelete(item)" aria-label="Remove link">
          <mat-icon>link_off</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <p *ngIf="items.length === 0" class="empty-message">No linked cases.</p>
</div>
