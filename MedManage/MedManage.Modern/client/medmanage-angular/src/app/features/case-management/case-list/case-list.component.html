<div class="case-list-container">
  <!-- Toolbar -->
  <mat-toolbar class="case-toolbar" color="primary">
    <span class="toolbar-title">
      <mat-icon>folder_open</mat-icon>
      {{ isMyView ? 'My Cases' : 'Case Search Results' }}
    </span>
    <span class="toolbar-spacer"></span>

    <button mat-button matTooltip="Open/Edit Selected Case" (click)="onOpenCase()">
      <mat-icon>edit</mat-icon> Open
    </button>

    <button mat-button matTooltip="Create New Case" (click)="onNewCase()" *hasRole="['Case Manager', 'System Administrator']">
      <mat-icon>add_circle</mat-icon> New Case
    </button>

    <button mat-button matTooltip="Copy Selected Case" (click)="onCopyCase()" *hasRole="['Case Manager', 'System Administrator']">
      <mat-icon>content_copy</mat-icon> Copy
    </button>

    <button mat-button matTooltip="Export to Excel (CSV)" (click)="onExportExcel()">
      <mat-icon>download</mat-icon> Export
    </button>

    <button mat-button matTooltip="Print Report (PDF)" (click)="onPrintReport()" [disabled]="exporting">
      <mat-icon>print</mat-icon> Report
    </button>
  </mat-toolbar>

  <!-- Search Panel -->
  <mat-card class="search-card">
    <mat-card-content>
      <form [formGroup]="searchForm" (ngSubmit)="onSearch()" class="search-form">
        <!-- Row 1: Text filters -->
        <div class="search-row">
          <mat-form-field appearance="outline">
            <mat-label>Case Number (Auth #)</mat-label>
            <input matInput formControlName="authNumber" placeholder="Auth number...">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Member No</mat-label>
            <input matInput formControlName="memberNumber" placeholder="Member number...">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Surname</mat-label>
            <input matInput formControlName="surname" placeholder="Surname...">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Name</mat-label>
            <input matInput formControlName="name" placeholder="Name...">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Practice</mat-label>
            <input matInput formControlName="practiceName" placeholder="Practice name...">
          </mat-form-field>
        </div>

        <!-- Row 2: Date range, Medical Funder, Status, Case Type -->
        <div class="search-row">
          <!-- Date Created range with enable checkbox -->
          <mat-checkbox formControlName="dateCreatedEnabled">
            Date Created
          </mat-checkbox>
          <mat-form-field appearance="outline">
            <mat-label>From</mat-label>
            <input matInput [matDatepicker]="dateFromPicker" formControlName="dateCreatedFrom"
              [disabled]="!searchForm.get('dateCreatedEnabled')?.value">
            <mat-datepicker-toggle matIconSuffix [for]="dateFromPicker"></mat-datepicker-toggle>
            <mat-datepicker #dateFromPicker></mat-datepicker>
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>To</mat-label>
            <input matInput [matDatepicker]="dateToPicker" formControlName="dateCreatedTo"
              [disabled]="!searchForm.get('dateCreatedEnabled')?.value">
            <mat-datepicker-toggle matIconSuffix [for]="dateToPicker"></mat-datepicker-toggle>
            <mat-datepicker #dateToPicker></mat-datepicker>
          </mat-form-field>

          <!-- Medical Funder with enable checkbox -->
          <mat-checkbox formControlName="medicalAidEnabled">
            Medical Funder
          </mat-checkbox>
          <mat-form-field appearance="outline">
            <mat-label>Medical Funder</mat-label>
            <mat-select formControlName="medicalAidId"
              [disabled]="!searchForm.get('medicalAidEnabled')?.value">
              <mat-option [value]="null">-- All --</mat-option>
              @for (aid of medicalAids; track aid.id) {
                <mat-option [value]="aid.id">{{ aid.name }}</mat-option>
              }
            </mat-select>
          </mat-form-field>

          <!-- Status dropdown -->
          <app-reference-data-dropdown
            resource="case-status"
            label="Status"
            [mode]="'select'"
            formControlName="statusId">
          </app-reference-data-dropdown>

          <!-- Case/Auth Type dropdown -->
          <app-reference-data-dropdown
            resource="case-type"
            label="Case/Auth Type"
            [mode]="'select'"
            formControlName="authTypeId">
          </app-reference-data-dropdown>
        </div>

        <!-- Search Actions -->
        <div class="search-actions">
          <button mat-raised-button color="primary" type="submit">
            <mat-icon>search</mat-icon> Search
          </button>
          <button mat-stroked-button type="button" (click)="onReset()">
            <mat-icon>refresh</mat-icon> My Cases
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>

  <!-- Loading overlay for report export -->
  @if (exporting) {
    <div class="export-overlay">
      <mat-spinner diameter="40"></mat-spinner>
      <span>Generating report...</span>
    </div>
  }

  <!-- Results Table -->
  <app-data-table
    [columns]="tableColumnDefs"
    [data]="rowData"
    [totalCount]="totalCount"
    [pageSize]="pageSize"
    [pageIndex]="pageIndex"
    [emptyMessage]="isMyView ? 'No cases assigned to you.' : 'No cases found. Try adjusting your search criteria.'"
    [selectable]="true"
    [selectedRow]="selectedCase"
    (rowClick)="selectedCase = $event"
    (rowDblClick)="onRowDoubleClicked2($event)"
    (pageChange)="onPageChange($event)">
  </app-data-table>
</div>
