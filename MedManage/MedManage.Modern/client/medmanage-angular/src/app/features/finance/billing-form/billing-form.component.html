<div class="billing-form-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>{{ isEditMode ? 'Edit Billing Record' : 'New Billing Record' }}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      @if (loading) {
        <div class="loading-spinner">
          <mat-spinner diameter="40"></mat-spinner>
        </div>
      } @else {
        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="billing-form">
          <div class="form-row">
            <mat-form-field appearance="outline">
              <mat-label>Case ID</mat-label>
              <input matInput type="number" formControlName="caseId" placeholder="Enter case ID">
              @if (form.controls.caseId.hasError('required')) {
                <mat-error>Case ID is required</mat-error>
              }
            </mat-form-field>

            <mat-form-field appearance="outline">
              <mat-label>Account Number</mat-label>
              <input matInput formControlName="accountNumber" placeholder="Enter account number">
            </mat-form-field>

            <mat-form-field appearance="outline">
              <mat-label>Invoice Number</mat-label>
              <input matInput formControlName="invoiceNumber" placeholder="Enter invoice number">
            </mat-form-field>
          </div>

          <div class="form-row">
            <app-reference-data-dropdown
              resource="billing-status"
              label="Billing Status"
              formControlName="billingStatusId">
            </app-reference-data-dropdown>

            <mat-form-field appearance="outline">
              <mat-label>Amount</mat-label>
              <input matInput type="number" formControlName="amount" placeholder="0.00">
              <span matTextPrefix>R&nbsp;</span>
            </mat-form-field>

            <mat-form-field appearance="outline">
              <mat-label>Final Invoice Amount</mat-label>
              <input matInput type="number" formControlName="finalInvoiceAmount" placeholder="0.00">
              <span matTextPrefix>R&nbsp;</span>
            </mat-form-field>
          </div>

          <div class="form-row">
            <mat-form-field appearance="outline">
              <mat-label>Date Received</mat-label>
              <input matInput [matDatepicker]="receivedPicker" formControlName="dateReceived">
              <mat-datepicker-toggle matIconSuffix [for]="receivedPicker"></mat-datepicker-toggle>
              <mat-datepicker #receivedPicker></mat-datepicker>
            </mat-form-field>

            <mat-form-field appearance="outline">
              <mat-label>Date Submitted</mat-label>
              <input matInput [matDatepicker]="submittedPicker" formControlName="dateSubmitted">
              <mat-datepicker-toggle matIconSuffix [for]="submittedPicker"></mat-datepicker-toggle>
              <mat-datepicker #submittedPicker></mat-datepicker>
            </mat-form-field>
          </div>

          <div class="form-row full-width">
            <mat-form-field appearance="outline">
              <mat-label>Comments</mat-label>
              <textarea matInput formControlName="comments" rows="3" placeholder="Enter comments"></textarea>
            </mat-form-field>
          </div>

          <div class="form-actions">
            <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
              <mat-icon>save</mat-icon> {{ isEditMode ? 'Update' : 'Create' }}
            </button>
            @if (isEditMode) {
              <button mat-raised-button color="warn" type="button" (click)="onDelete()">
                <mat-icon>delete</mat-icon> Delete
              </button>
            }
            <button mat-stroked-button type="button" (click)="onCancel()">
              <mat-icon>cancel</mat-icon> Cancel
            </button>
          </div>
        </form>
      }
    </mat-card-content>
  </mat-card>
</div>
