<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: 12px;
            line-height: 1.6;
            color: #333;
            margin: 40px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #007bff;
            padding-bottom: 20px;
        }
        .header h1 {
            color: #007bff;
            margin-bottom: 5px;
        }
        .case-info {
            margin-bottom: 20px;
        }
        .case-info table {
            width: 100%;
            border-collapse: collapse;
        }
        .case-info td {
            padding: 5px 10px;
            vertical-align: top;
        }
        .case-info td.label {
            font-weight: bold;
            width: 150px;
            color: #555;
        }
        .section-title {
            font-size: 14px;
            font-weight: bold;
            color: #007bff;
            margin-top: 20px;
            margin-bottom: 10px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 5px;
        }
        .notes {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-top: 10px;
        }
        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 10px;
            color: #888;
            border-top: 1px solid #ddd;
            padding-top: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>MedManage</h1>
        <p>Case Letter</p>
    </div>

    <div class="section-title">Case Details</div>
    <div class="case-info">
        <table>
            <tr>
                <td class="label">Case ID:</td>
                <td>{{caseId}}</td>
            </tr>
            <tr>
                <td class="label">Generated:</td>
                <td>{{now}}</td>
            </tr>
        </table>
    </div>

    <div class="section-title">Letter Notes</div>
    <div class="notes">
        <p>{{letterNote}}</p>
    </div>

    <div class="footer">
        <p>Generated by MedManage &copy; {{year}} | Confidential</p>
    </div>
</body>
</html>
